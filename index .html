<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>スケスケPNGメーカー</title>
  <style>
    :root{--bg:#fff7fb;--card:#ffffff;--ink:#2b2430;--muted:#776b7f;--accent:#ff6fae;--accent2:#5b3df5;--line:#eadfec;--shadow:0 14px 40px rgba(60,30,80,.12)}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;background:linear-gradient(180deg,#fff7fb,#f6f2ff);color:var(--ink);min-height:100vh;padding:18px}
    .wrap{max-width:980px;margin:0 auto}.hero{text-align:center;padding:18px 6px 10px}.hero h1{font-size:clamp(28px,7vw,46px);margin:0 0 8px;letter-spacing:.03em}.hero p{margin:0;color:var(--muted);font-size:16px;line-height:1.7}.card{background:rgba(255,255,255,.9);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);padding:18px;margin:16px 0}.upload{border:3px dashed #ffc0dc;border-radius:24px;padding:24px;text-align:center;background:#fff}.upload input{display:none}.upload label{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--accent);color:#fff;border-radius:999px;padding:15px 24px;font-weight:800;font-size:18px;box-shadow:0 8px 18px rgba(255,111,174,.25)}.hint{color:var(--muted);font-size:14px;margin-top:12px}.grid{display:grid;grid-template-columns:1fr;gap:16px}@media(min-width:850px){.grid{grid-template-columns:1fr 1fr}}.panel h2{margin:0 0 12px;font-size:20px}.canvasBox{position:relative;min-height:260px;border-radius:22px;border:1px solid var(--line);overflow:hidden;background-color:#fff;background-image:linear-gradient(45deg,#eee 25%,transparent 25%),linear-gradient(-45deg,#eee 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#eee 75%),linear-gradient(-45deg,transparent 75%,#eee 75%);background-size:28px 28px;background-position:0 0,0 14px,14px -14px,-14px 0;display:flex;align-items:center;justify-content:center}.canvasBox.black{background:#111;background-image:none}.canvasBox canvas{max-width:100%;max-height:520px;display:block}.controls{display:grid;gap:14px;margin-top:14px}.row{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px}.row label{display:flex;justify-content:space-between;gap:12px;font-weight:700}.row small{display:block;color:var(--muted);margin-top:5px;line-height:1.4}.row input[type=range]{width:100%;margin-top:12px}.buttons{display:grid;grid-template-columns:1fr;gap:10px;margin-top:14px}@media(min-width:650px){.buttons{grid-template-columns:repeat(3,1fr)}}button{border:0;border-radius:18px;padding:14px 16px;font-weight:900;font-size:16px;color:#fff;background:var(--accent2);box-shadow:0 8px 18px rgba(91,61,245,.18)}button.secondary{background:#2b2430}button.pink{background:var(--accent)}button:disabled{opacity:.45}.note{font-size:13px;color:var(--muted);line-height:1.7;margin-top:10px}.footer{text-align:center;color:#9a8ea3;font-size:12px;padding:18px}.pill{display:inline-block;border-radius:999px;background:#fff;border:1px solid var(--line);padding:6px 12px;color:#7a6b83;font-size:13px;margin-top:12px}.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#2b2430;color:#fff;padding:12px 18px;border-radius:999px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.25s}.toast.show{opacity:1;bottom:32px}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>スケスケPNGメーカー</h1>
      <p>白背景を透明にして、Tシャツ用PNGを作るアプリ。<br>黒T用の白ライン版もワンタップで作れます。</p>
      <div class="pill">回数制限なし・iPhoneだけで使える</div>
    </section>

    <section class="card upload">
      <input id="file" type="file" accept="image/*" />
      <label for="file">画像を選ぶ</label>
      <div class="hint">白背景・単色背景のイラストやロゴ向きです</div>
    </section>

    <section class="grid">
      <div class="card panel">
        <h2>透過プレビュー</h2>
        <div class="canvasBox"><canvas id="out"></canvas></div>
        <div class="controls">
          <div class="row">
            <label>白を消す強さ <span id="tVal">38</span></label>
            <input id="threshold" type="range" min="0" max="120" value="38">
            <small>白っぽい背景が残る時は上げる。絵まで消える時は下げる。</small>
          </div>
          <div class="row">
            <label>境目のなじませ <span id="sVal">22</span></label>
            <input id="soft" type="range" min="0" max="80" value="22">
            <small>フチの白残りをふんわり消します。</small>
          </div>
          <div class="row">
            <label>余白カット <span id="pVal">30</span></label>
            <input id="padding" type="range" min="0" max="120" value="30">
            <small>透明になった余白を切って、少しだけ余白を残します。</small>
          </div>
        </div>
      </div>

      <div class="card panel">
        <h2>黒T確認</h2>
        <div class="canvasBox black"><canvas id="blackPreview"></canvas></div>
        <div class="buttons">
          <button class="pink" id="downloadPng" disabled>透過PNG保存</button>
          <button id="downloadWhite" disabled>白ライン版保存</button>
          <button class="secondary" id="downloadColorWhite" disabled>色あり白フチ保存</button>
        </div>
        <div class="note">
          ※人物写真みたいな複雑背景のAI切り抜きではなく、白背景ロゴ・イラスト用です。<br>
          ※保存できない時は、画像を長押しして「写真に保存」してください。
        </div>
      </div>
    </section>
    <div class="footer">Made for Tシャツ画像づくり</div>
  </div>
  <div class="toast" id="toast">保存しました</div>

<script>
const file = document.getElementById('file');
const out = document.getElementById('out');
const blackPreview = document.getElementById('blackPreview');
const ctx = out.getContext('2d', { willReadFrequently:true });
const bctx = blackPreview.getContext('2d');
const threshold = document.getElementById('threshold');
const soft = document.getElementById('soft');
const padding = document.getElementById('padding');
const tVal = document.getElementById('tVal');
const sVal = document.getElementById('sVal');
const pVal = document.getElementById('pVal');
const btnPng = document.getElementById('downloadPng');
const btnWhite = document.getElementById('downloadWhite');
const btnColorWhite = document.getElementById('downloadColorWhite');
const toast = document.getElementById('toast');
let original = null;
let resultCanvas = null;
let whiteCanvas = null;
let colorWhiteCanvas = null;

function showToast(text){toast.textContent=text;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1600)}
function fitSize(w,h,max=1800){const r=Math.min(1,max/w,max/h);return [Math.round(w*r),Math.round(h*r)]}
function luminance(r,g,b){return 0.299*r+0.587*g+0.114*b}
function process(){
  if(!original) return;
  tVal.textContent=threshold.value; sVal.textContent=soft.value; pVal.textContent=padding.value;
  const t=Number(threshold.value), s=Number(soft.value), pad=Number(padding.value);
  const [w,h]=fitSize(original.width, original.height);
  const temp=document.createElement('canvas'); temp.width=w; temp.height=h;
  const tx=temp.getContext('2d',{willReadFrequently:true}); tx.drawImage(original,0,0,w,h);
  const img=tx.getImageData(0,0,w,h); const d=img.data;
  for(let i=0;i<d.length;i+=4){
    const r=d[i],g=d[i+1],b=d[i+2];
    const dist=Math.sqrt((255-r)**2+(255-g)**2+(255-b)**2);
    const lum=luminance(r,g,b);
    let a=255;
    if(lum>245-t && dist<t*2.2){
      a=Math.max(0, Math.min(255, (dist-(t*0.22))*(255/Math.max(1,s))));
    }
    if(r>248-t/2 && g>248-t/2 && b>248-t/2) a=Math.min(a, dist*5);
    d[i+3]=Math.round(Math.min(d[i+3],a));
  }
  tx.putImageData(img,0,0);
  const bounds=getBounds(temp);
  const crop=document.createElement('canvas');
  if(bounds){
    const x=Math.max(0,bounds.x-pad), y=Math.max(0,bounds.y-pad);
    const x2=Math.min(w,bounds.x2+pad), y2=Math.min(h,bounds.y2+pad);
    crop.width=x2-x; crop.height=y2-y;
    crop.getContext('2d').drawImage(temp,x,y,crop.width,crop.height,0,0,crop.width,crop.height);
  }else{crop.width=w; crop.height=h; crop.getContext('2d').drawImage(temp,0,0)}
  resultCanvas=crop;
  drawTo(out,crop);
  makeWhiteVersions(crop);
  drawTo(blackPreview,colorWhiteCanvas || crop);
  btnPng.disabled=false; btnWhite.disabled=false; btnColorWhite.disabled=false;
}
function getBounds(c){
  const x=c.getContext('2d',{willReadFrequently:true}); const img=x.getImageData(0,0,c.width,c.height).data;
  let minX=c.width,minY=c.height,maxX=-1,maxY=-1;
  for(let y=0;y<c.height;y++){for(let x0=0;x0<c.width;x0++){const a=img[(y*c.width+x0)*4+3];if(a>12){if(x0<minX)minX=x0;if(y<minY)minY=y;if(x0>maxX)maxX=x0;if(y>maxY)maxY=y;}}}
  if(maxX<0) return null; return {x:minX,y:minY,x2:maxX+1,y2:maxY+1};
}
function drawTo(canvas,src){canvas.width=src.width; canvas.height=src.height; canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height); canvas.getContext('2d').drawImage(src,0,0)}
function makeWhiteVersions(src){
  whiteCanvas=document.createElement('canvas'); whiteCanvas.width=src.width; whiteCanvas.height=src.height;
  const wx=whiteCanvas.getContext('2d'); wx.drawImage(src,0,0); let im=wx.getImageData(0,0,src.width,src.height); let d=im.data;
  for(let i=0;i<d.length;i+=4){ if(d[i+3]>0){d[i]=255;d[i+1]=255;d[i+2]=255;} }
  wx.putImageData(im,0,0);
  colorWhiteCanvas=document.createElement('canvas'); colorWhiteCanvas.width=src.width+24; colorWhiteCanvas.height=src.height+24;
  const cx=colorWhiteCanvas.getContext('2d');
  cx.shadowColor='white'; cx.shadowBlur=0;
  for(let dx=-8;dx<=8;dx+=2){for(let dy=-8;dy<=8;dy+=2){if(dx*dx+dy*dy<=64){cx.drawImage(whiteCanvas,12+dx,12+dy)}}}
  cx.drawImage(src,12,12);
}
function download(canvas,name){
  if(!canvas) return;
  const a=document.createElement('a'); a.download=name; a.href=canvas.toDataURL('image/png'); document.body.appendChild(a); a.click(); a.remove(); showToast('保存しました');
}
file.addEventListener('change',e=>{const f=e.target.files[0]; if(!f) return; const img=new Image(); img.onload=()=>{original=img; process()}; img.src=URL.createObjectURL(f)});
[threshold,soft,padding].forEach(el=>el.addEventListener('input',process));
btnPng.addEventListener('click',()=>download(resultCanvas,'transparent.png'));
btnWhite.addEventListener('click',()=>download(whiteCanvas,'white-line.png'));
btnColorWhite.addEventListener('click',()=>download(colorWhiteCanvas,'color-white-edge.png'));
</script>
</body>
</html>
