<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>スケスケPNGメーカー 改良版</title>
<style>
  :root{--pink:#ff66b3;--purple:#8b7cf6;--bg:#fff5ff;--ink:#2b2430;--soft:#f5eaff;}
  *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:linear-gradient(180deg,#fff4fb,#f5efff);color:var(--ink)}
  .wrap{max-width:980px;margin:auto;padding:18px}.hero{background:white;border-radius:28px;padding:22px;box-shadow:0 10px 30px #d9c4e855;border:1px solid #eadbf3;text-align:center}
  h1{margin:0 0 8px;font-size:30px}.sub{font-size:14px;color:#6f6278;line-height:1.5}.upload{margin:18px 0;padding:22px;border:3px dashed #ffd0e9;border-radius:20px;background:#fffaff}.upload input{display:none}.upload label{display:inline-block;background:var(--pink);color:white;font-weight:800;padding:14px 26px;border-radius:999px;box-shadow:0 7px 0 #dc4f95}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}.card{background:white;border-radius:22px;padding:14px;box-shadow:0 8px 22px #d7c8e044;border:1px solid #eee}.card h2{font-size:18px;margin:0 0 10px}.preview{min-height:270px;border-radius:18px;display:flex;align-items:center;justify-content:center;overflow:hidden;background-image:linear-gradient(45deg,#ddd 25%,transparent 25%),linear-gradient(-45deg,#ddd 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#ddd 75%),linear-gradient(-45deg,transparent 75%,#ddd 75%);background-size:24px 24px;background-position:0 0,0 12px,12px -12px,-12px 0}.black{background:#111}.preview canvas,.preview img{max-width:100%;max-height:410px;image-rendering:auto}
  .controls{display:grid;gap:12px;margin-top:16px}.row{background:#fff;border:1px solid #eee;border-radius:16px;padding:12px;text-align:left}.row label{display:flex;justify-content:space-between;gap:10px;font-weight:700;font-size:14px}.row small{display:block;color:#7e7384;font-weight:500;margin-top:4px;line-height:1.45}.row input[type=range]{width:100%;accent-color:var(--pink);margin-top:8px}.buttons{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}.btn{border:0;border-radius:999px;padding:13px 16px;font-weight:900;color:white;background:var(--pink);font-size:15px}.btn.purple{background:var(--purple)}.btn.dark{background:#4a4650}.btn:disabled{opacity:.35}.note{font-size:13px;color:#756a7c;text-align:left;line-height:1.6;margin-top:12px}.pill{display:inline-block;background:#f8e4f0;color:#a3296c;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:800;margin-left:6px}
  @media(max-width:760px){.grid{grid-template-columns:1fr}h1{font-size:24px}.preview{min-height:220px}.wrap{padding:12px}.hero{padding:16px}}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <h1>スケスケPNGメーカー 改良版<span class="pill">高精度</span></h1>
    <div class="sub">白背景・薄い背景をきれいに透過。しきい値、なめらかさ、白フチを調整できます。</div>
    <div class="upload"><label for="file">画像を選ぶ</label><input id="file" type="file" accept="image/*"></div>
    <div class="grid">
      <div class="card"><h2>元画像</h2><div class="preview"><img id="srcImg" alt="元画像"></div></div>
      <div class="card"><h2>黒T確認</h2><div class="preview black"><canvas id="out"></canvas></div><div class="buttons"><button class="btn" id="save" disabled>透過PNG保存</button><button class="btn purple" id="saveWhite" disabled>白ライン版保存</button><button class="btn dark" id="reset" disabled>おすすめ値に戻す</button></div></div>
    </div>
    <div class="controls">
      <div class="row"><label>背景を消す強さ <span id="vTol">38</span></label><input id="tol" type="range" min="5" max="110" value="38"><small>上げるほど白・薄い色を透明にします。消えすぎたら下げてください。</small></div>
      <div class="row"><label>境界のなめらかさ <span id="vSoft">28</span></label><input id="soft" type="range" min="0" max="80" value="28"><small>フチのギザギザを減らします。上げすぎると線が細くなります。</small></div>
      <div class="row"><label>白フチの太さ <span id="vStroke">5</span></label><input id="stroke" type="range" min="0" max="18" value="5"><small>黒Tで見やすい白フチを足します。不要なら0に。</small></div>
      <div class="row"><label>線をくっきり <span id="vBoost">18</span></label><input id="boost" type="range" min="0" max="60" value="18"><small>薄い線を少し濃くします。ロゴ・イラスト向け。</small></div>
    </div>
    <div class="note">コツ：白い紙・白背景のイラスト向けです。写真の人物切り抜きはAI系アプリの方が強いです。</div>
  </section>
</div>
<script>
const file=document.getElementById('file'), srcImg=document.getElementById('srcImg'), out=document.getElementById('out');
const save=document.getElementById('save'), saveWhite=document.getElementById('saveWhite'), reset=document.getElementById('reset');
const tol=document.getElementById('tol'), soft=document.getElementById('soft'), stroke=document.getElementById('stroke'), boost=document.getElementById('boost');
const ids=[['tol','vTol'],['soft','vSoft'],['stroke','vStroke'],['boost','vBoost']];
let img=null, resultCanvas=null;
ids.forEach(([a,b])=>document.getElementById(a).addEventListener('input',()=>{document.getElementById(b).textContent=document.getElementById(a).value; process();}));
file.addEventListener('change', e=>{const f=e.target.files[0]; if(!f)return; const url=URL.createObjectURL(f); img=new Image(); img.onload=()=>{srcImg.src=url; save.disabled=saveWhite.disabled=reset.disabled=false; process();}; img.src=url;});
reset.addEventListener('click',()=>{tol.value=38;soft.value=28;stroke.value=5;boost.value=18;ids.forEach(([a,b])=>document.getElementById(b).textContent=document.getElementById(a).value);process();});
function process(){ if(!img)return; const max=1600; let w=img.naturalWidth,h=img.naturalHeight; const scale=Math.min(1,max/Math.max(w,h)); w=Math.round(w*scale); h=Math.round(h*scale); const c=document.createElement('canvas'), ctx=c.getContext('2d',{willReadFrequently:true}); c.width=w;c.height=h; ctx.drawImage(img,0,0,w,h); let data=ctx.getImageData(0,0,w,h); const d=data.data; const T=+tol.value, S=+soft.value, B=+boost.value;
  // sample corner background color
  const samples=[[2,2],[w-3,2],[2,h-3],[w-3,h-3],[Math.floor(w/2),2],[Math.floor(w/2),h-3]]; let br=0,bg=0,bb=0; samples.forEach(([x,y])=>{let i=(y*w+x)*4;br+=d[i];bg+=d[i+1];bb+=d[i+2];}); br/=samples.length;bg/=samples.length;bb/=samples.length;
  for(let i=0;i<d.length;i+=4){let r=d[i],g=d[i+1],b=d[i+2]; const dist=Math.sqrt((r-br)**2+(g-bg)**2+(b-bb)**2); const bright=(r+g+b)/3; const whiteish=Math.max(r,g,b)-Math.min(r,g,b)<38 && bright>185; let a=255; const limit=T*2.1; if(dist<limit || whiteish){ a=Math.max(0, Math.min(255, (dist-(limit-S))*255/Math.max(1,S))); } d[i+3]=a; if(a>5){ const factor=1+B/100; d[i]=Math.max(0,Math.min(255,(r-128)*factor+128)); d[i+1]=Math.max(0,Math.min(255,(g-128)*factor+128)); d[i+2]=Math.max(0,Math.min(255,(b-128)*factor+128)); }}
  ctx.putImageData(data,0,0); resultCanvas=addStroke(c,+stroke.value,false); drawToOut(resultCanvas); }
function addStroke(base, radius, whiteOnly){ const w=base.width,h=base.height; const src=base.getContext('2d').getImageData(0,0,w,h); const res=document.createElement('canvas');res.width=w;res.height=h; const rctx=res.getContext('2d'); if(radius>0){ const mask=rctx.createImageData(w,h), md=mask.data, sd=src.data; for(let y=0;y<h;y++){for(let x=0;x<w;x++){let maxA=0; for(let yy=-radius;yy<=radius;yy++){for(let xx=-radius;xx<=radius;xx++){if(xx*xx+yy*yy>radius*radius)continue; const nx=x+xx,ny=y+yy; if(nx<0||ny<0||nx>=w||ny>=h)continue; const a=sd[(ny*w+nx)*4+3]; if(a>maxA)maxA=a;}} const idx=(y*w+x)*4; md[idx]=md[idx+1]=md[idx+2]=255; md[idx+3]=maxA;}} rctx.putImageData(mask,0,0); }
 rctx.drawImage(base,0,0); if(whiteOnly){ const imgd=rctx.getImageData(0,0,w,h), dd=imgd.data; for(let i=0;i<dd.length;i+=4){ if(dd[i+3]>0){dd[i]=dd[i+1]=dd[i+2]=255;} } rctx.putImageData(imgd,0,0);} return res; }
function drawToOut(c){ out.width=c.width;out.height=c.height; const ctx=out.getContext('2d'); ctx.clearRect(0,0,c.width,c.height); ctx.drawImage(c,0,0); }
function dl(canvas,name){ const a=document.createElement('a'); a.href=canvas.toDataURL('image/png'); a.download=name; document.body.appendChild(a); a.click(); a.remove(); }
save.addEventListener('click',()=>{if(resultCanvas)dl(resultCanvas,'sukesuke-transparent.png')});
saveWhite.addEventListener('click',()=>{if(!img)return; const white=addStroke(resultCanvas,0,true); dl(white,'sukesuke-white-line.png')});
</script>
</body>
</html>
