<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>スケスケPNGメーカー Tシャツモード</title>
<style>
  :root{--pink:#ff63ad;--lav:#f8efff;--ink:#25202b;--muted:#7c7180}
  *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;background:linear-gradient(180deg,#fff,#fbf2ff);color:var(--ink)}
  .wrap{max-width:980px;margin:0 auto;padding:18px} header{text-align:center;margin:8px 0 16px} h1{font-size:24px;margin:0 0 8px}.badge{background:var(--pink);color:#fff;border-radius:999px;padding:4px 10px;font-size:13px}
  .drop{background:#fff;border:2px dashed #f5bfd9;border-radius:20px;padding:22px;text-align:center;box-shadow:0 10px 28px rgba(130,80,150,.09);margin-bottom:14px}
  input[type=file]{display:none}.pick{display:inline-block;background:var(--pink);color:#fff;border-radius:999px;padding:12px 20px;font-weight:800}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.card{background:#fff;border-radius:22px;padding:14px;box-shadow:0 10px 28px rgba(130,80,150,.08);border:1px solid #f2def0}.card h2{font-size:16px;margin:0 0 10px}
  .preview{min-height:300px;border-radius:16px;display:flex;align-items:center;justify-content:center;overflow:hidden;background-image:linear-gradient(45deg,#eee 25%,transparent 25%),linear-gradient(-45deg,#eee 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#eee 75%),linear-gradient(-45deg,transparent 75%,#eee 75%);background-size:20px 20px;background-position:0 0,0 10px,10px -10px,-10px 0}
  .black{background:#111;background-image:none}.preview canvas,.preview img{max-width:100%;height:auto;display:block}
  .controls{margin-top:14px}.row{background:#fff;border-radius:18px;padding:12px;margin:10px 0;border:1px solid #f1d9ed}.label{display:flex;justify-content:space-between;font-weight:700;font-size:14px;margin-bottom:6px}.hint{font-size:12px;color:var(--muted);line-height:1.45;margin-top:6px}input[type=range]{width:100%;accent-color:var(--pink)}
  .buttons{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}button{border:0;border-radius:999px;padding:12px 16px;font-weight:900;color:#fff;background:var(--pink);font-size:15px}button.secondary{background:#9f87ff}button.gray{background:#9a9a9a}button:disabled{opacity:.45}.note{font-size:13px;color:#62566a;line-height:1.6;background:#fff;border-radius:18px;padding:14px;border:1px solid #f1d9ed;margin-top:14px}
  @media(max-width:760px){.grid{grid-template-columns:1fr}.preview{min-height:260px}}
</style>
</head>
<body>
<div class="wrap">
<header><h1>スケスケPNGメーカー <span class="badge">Tシャツモード</span></h1><div class="hint">白背景・単色背景のイラストを、黒Tシャツ用にくっきり変換する版</div></header>
<label class="drop" id="drop"><input id="file" type="file" accept="image/*"><span class="pick">画像を選ぶ</span><div class="hint">画像を選んだら「Tシャツ用に変換」を押してね</div></label>
<div class="grid">
 <div class="card"><h2>元画像プレビュー</h2><div class="preview" id="origBox"><span class="hint">ここに元画像</span></div></div>
 <div class="card"><h2>黒T確認</h2><div class="preview black"><canvas id="out"></canvas></div><div class="buttons"><button id="tshirt">Tシャツ用に変換</button><button id="save" class="secondary" disabled>透過PNG保存</button><button id="reset" class="gray">リセット</button></div></div>
</div>
<div class="card controls">
 <h2>調整</h2>
 <div class="row"><div class="label"><span>背景を消す強さ</span><b id="vBg">38</b></div><input id="bg" type="range" min="5" max="90" value="38"><div class="hint">数字を上げるほど背景を広く消す。線まで消えるなら下げる。</div></div>
 <div class="row"><div class="label"><span>線を守る強さ</span><b id="vKeep">42</b></div><input id="keep" type="range" min="0" max="90" value="42"><div class="hint">薄緑・薄茶の線を残したい時は上げる。背景が残るなら下げる。</div></div>
 <div class="row"><div class="label"><span>白フチの太さ</span><b id="vStroke">8</b></div><input id="stroke" type="range" min="0" max="28" value="8"><div class="hint">黒T用の白フチ。太くすると印刷で見えやすい。</div></div>
 <div class="row"><div class="label"><span>くっきり補正</span><b id="vSharp">28</b></div><input id="sharp" type="range" min="0" max="80" value="28"><div class="hint">ぼやけた線を少し締める。上げすぎるとギザつく。</div></div>
</div>
<div class="note">コツ：まずそのまま変換。線が欠けたら「線を守る強さ」を上げる。背景が残ったら「背景を消す強さ」を上げる。Tシャツ用は白フチ少し太めが正解。</div>
</div>
<script>
const file=document.getElementById('file'), origBox=document.getElementById('origBox'), out=document.getElementById('out'), ctx=out.getContext('2d');
const ids=['bg','keep','stroke','sharp']; const vals={bg:vBg,keep:vKeep,stroke:vStroke,sharp:vSharp};
let img=null, originalCanvas=null;
ids.forEach(id=>document.getElementById(id).addEventListener('input',()=>{vals[id].textContent=document.getElementById(id).value;if(img)convert()}));
file.addEventListener('change',e=>load(e.target.files[0]));
drop.addEventListener('dragover',e=>{e.preventDefault();drop.style.borderColor='#ff63ad'});drop.addEventListener('dragleave',()=>drop.style.borderColor='#f5bfd9');drop.addEventListener('drop',e=>{e.preventDefault();drop.style.borderColor='#f5bfd9';load(e.dataTransfer.files[0])});
function load(f){ if(!f) return; const r=new FileReader(); r.onload=()=>{img=new Image(); img.onload=()=>{origBox.innerHTML=''; const im=document.createElement('img'); im.src=r.result; origBox.appendChild(im); prep(); convert();}; img.src=r.result}; r.readAsDataURL(f)}
function prep(){ const max=1600, scale=Math.min(1,max/Math.max(img.width,img.height)); const c=document.createElement('canvas'); c.width=Math.round(img.width*scale); c.height=Math.round(img.height*scale); c.getContext('2d').drawImage(img,0,0,c.width,c.height); originalCanvas=c; out.width=c.width; out.height=c.height; }
function colorDist(a,b){let dr=a[0]-b[0],dg=a[1]-b[1],db=a[2]-b[2];return Math.sqrt(dr*dr+dg*dg+db*db)}
function convert(){ if(!originalCanvas)return; const w=originalCanvas.width,h=originalCanvas.height; out.width=w;out.height=h; const sctx=originalCanvas.getContext('2d'); let im=sctx.getImageData(0,0,w,h), d=im.data;
 const bgN=Number(bg.value), keepN=Number(keep.value), strokeN=Number(stroke.value), sharpN=Number(sharp.value);
 // 背景色を四隅から自動推定
 const pts=[[2,2],[w-3,2],[2,h-3],[w-3,h-3],[Math.floor(w/2),2],[Math.floor(w/2),h-3]]; let br=0,bgcol=0,bb=0;
 pts.forEach(p=>{let i=(p[1]*w+p[0])*4;br+=d[i];bgcol+=d[i+1];bb+=d[i+2]}); const bgc=[br/pts.length,bgcol/pts.length,bb/pts.length];
 let alpha=new Uint8ClampedArray(w*h), lum=new Uint8ClampedArray(w*h);
 for(let y=0;y<h;y++)for(let x=0;x<w;x++){let i=(y*w+x)*4, p=[d[i],d[i+1],d[i+2]]; let dist=colorDist(p,bgc); let l=(p[0]*.299+p[1]*.587+p[2]*.114); lum[y*w+x]=l; let sat=Math.max(p[0],p[1],p[2])-Math.min(p[0],p[1],p[2]); let keepLine=(sat>keepN || dist>bgN*2.2); let a= keepLine ? 255 : Math.max(0, Math.min(255, (dist-bgN)*8)); alpha[y*w+x]=a; }
 // エッジを守る
 for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){let k=y*w+x; let gx=Math.abs(lum[k-1]-lum[k+1]), gy=Math.abs(lum[k-w]-lum[k+w]); if(gx+gy>35+sharpN*.4) alpha[k]=Math.max(alpha[k],220);}
 // 小さい穴を少し埋める
 for(let pass=0;pass<1;pass++){let copy=alpha.slice(); for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){let k=y*w+x,c=0; for(let yy=-1;yy<=1;yy++)for(let xx=-1;xx<=1;xx++) if(copy[k+yy*w+xx]>120)c++; if(c>=6)alpha[k]=Math.max(alpha[k],220);}}
 // 白フチ用マスクを膨張
 let mask=new Uint8ClampedArray(w*h); for(let i=0;i<w*h;i++) if(alpha[i]>60) mask[i]=255;
 let outline=mask.slice(); const r=Math.max(0,strokeN|0); if(r>0){ for(let y=0;y<h;y++)for(let x=0;x<w;x++){let k=y*w+x;if(mask[k])continue; let hit=false; for(let yy=-r;yy<=r&&!hit;yy++){let ny=y+yy;if(ny<0||ny>=h)continue; for(let xx=-r;xx<=r;xx++){if(xx*xx+yy*yy>r*r)continue;let nx=x+xx;if(nx<0||nx>=w)continue;if(mask[ny*w+nx]){hit=true;break}}} if(hit)outline[k]=255;}}
 // 描画：アウトライン白、元線はくっきり
 let od=ctx.createImageData(w,h), o=od.data; for(let k=0;k<w*h;k++){let i=k*4; if(outline[k]&&!mask[k]){o[i]=255;o[i+1]=255;o[i+2]=255;o[i+3]=230;} if(mask[k]){let boost=1+sharpN/160; o[i]=Math.max(0,Math.min(255,(d[i]-128)*boost+128)); o[i+1]=Math.max(0,Math.min(255,(d[i+1]-128)*boost+128)); o[i+2]=Math.max(0,Math.min(255,(d[i+2]-128)*boost+128)); o[i+3]=alpha[k];}}
 ctx.putImageData(od,0,0); save.disabled=false; }
tshirt.onclick=convert; reset.onclick=()=>{bg.value=38;keep.value=42;stroke.value=8;sharp.value=28;ids.forEach(id=>vals[id].textContent=document.getElementById(id).value); if(img)convert()};
save.onclick=()=>{const a=document.createElement('a');a.download='tshirt-transparent.png';a.href=out.toDataURL('image/png');a.click()};
</script>
</body>
</html>
