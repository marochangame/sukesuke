<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>スケスケPNGメーカー 完成版</title>
<style>
  :root{
    --pink:#ff5aa7;
    --purple:#8d72ff;
    --bg:#fff4fb;
    --line:#f4cfe4;
    --ink:#26222c;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;
    color:var(--ink);
    background:linear-gradient(180deg,#fff 0%,var(--bg) 100%);
  }
  .wrap{max-width:980px;margin:0 auto;padding:18px 14px 40px}
  .hero{
    background:#fff;border:1px solid var(--line);border-radius:28px;
    padding:22px;box-shadow:0 12px 40px rgba(255,90,167,.12);
  }
  h1{font-size:28px;margin:0 0 8px;font-weight:900;letter-spacing:-.02em}
  .badge{font-size:14px;background:var(--pink);color:white;border-radius:999px;padding:5px 12px;vertical-align:middle;margin-left:6px}
  p{margin:6px 0;color:#62596a;line-height:1.55}
  .drop{
    margin-top:18px;border:3px dashed #f3b8d7;border-radius:24px;background:#fff9fd;
    padding:22px;text-align:center;
  }
  input[type=file]{display:none}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    border:0;border-radius:999px;padding:15px 22px;font-weight:900;font-size:17px;
    color:#fff;background:linear-gradient(135deg,var(--pink),#ff7cbd);
    box-shadow:0 8px 18px rgba(255,90,167,.22);
    cursor:pointer;text-decoration:none;min-height:52px;
  }
  .btn.purple{background:linear-gradient(135deg,var(--purple),#a58dff)}
  .btn.gray{background:#aaa;box-shadow:none}
  .btn.dark{background:#222;box-shadow:none}
  .btn:disabled{opacity:.45}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:18px}
  .card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:16px;box-shadow:0 6px 22px rgba(255,90,167,.08)}
  h2{font-size:20px;margin:0 0 14px}
  canvas{width:100%;height:auto;display:block;border-radius:18px;background:
    linear-gradient(45deg,#eee 25%,transparent 25%),
    linear-gradient(-45deg,#eee 25%,transparent 25%),
    linear-gradient(45deg,transparent 75%,#eee 75%),
    linear-gradient(-45deg,transparent 75%,#eee 75%);
    background-size:24px 24px;background-position:0 0,0 12px,12px -12px,-12px 0;
  }
  .blackBox{background:#111;border-radius:18px;padding:14px;min-height:220px;display:flex;align-items:center;justify-content:center}
  .blackBox canvas{background:transparent;border-radius:0}
  .controls{display:grid;gap:14px;margin-top:14px}
  .row{display:grid;grid-template-columns:1fr 80px;gap:10px;align-items:center}
  label{font-weight:800;font-size:14px}
  .val{text-align:right;font-weight:900}
  input[type=range]{width:100%;accent-color:var(--pink)}
  .actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px}
  .note{font-size:13px;background:#fff7fc;border:1px solid var(--line);border-radius:18px;padding:12px;margin-top:14px}
  @media(max-width:760px){
    .grid{grid-template-columns:1fr}
    h1{font-size:24px}
    .hero{padding:16px;border-radius:24px}
    .btn{width:100%}
  }
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <h1>スケスケPNGメーカー <span class="badge">完成版</span></h1>
    <p>白背景・薄い背景を透過して、黒Tシャツ用に「線を守る＋均一白フチ」で仕上げます。</p>
    <div class="drop" id="drop">
      <label class="btn" for="file">画像を選ぶ</label>
      <input id="file" type="file" accept="image/*">
      <p>画像を選んだら「Tシャツ用に変換」を押してね</p>
    </div>
  </section>

  <div class="grid">
    <div class="card">
      <h2>元画像プレビュー</h2>
      <canvas id="srcCanvas"></canvas>
    </div>
    <div class="card">
      <h2>黒T確認</h2>
      <div class="blackBox"><canvas id="outCanvas"></canvas></div>
      <div class="actions">
        <button id="makeBtn" class="btn" disabled>Tシャツ用に変換</button>
        <button id="saveBtn" class="btn purple" disabled>透過PNG保存</button>
        <button id="resetBtn" class="btn gray">リセット</button>
      </div>
    </div>
  </div>

  <section class="card" style="margin-top:18px">
    <h2>仕上げ調整</h2>
    <div class="controls">
      <div>
        <div class="row"><label>背景を消す強さ</label><span class="val" id="vBg">34</span></div>
        <input id="bgPower" type="range" min="18" max="70" value="34">
      </div>
      <div>
        <div class="row"><label>線を守る強さ</label><span class="val" id="vProtect">72</span></div>
        <input id="protectPower" type="range" min="40" max="95" value="72">
      </div>
      <div>
        <div class="row"><label>白フチの太さ</label><span class="val" id="vStroke">7</span></div>
        <input id="strokeSize" type="range" min="0" max="18" value="7">
      </div>
      <div>
        <div class="row"><label>なめらかさ</label><span class="val" id="vSmooth">2</span></div>
        <input id="smoothSize" type="range" min="0" max="5" value="2">
      </div>
      <div>
        <div class="row"><label>小さいゴミ除去</label><span class="val" id="vNoise">2</span></div>
        <input id="noiseSize" type="range" min="0" max="8" value="2">
      </div>
    </div>
    <div class="note">
      おすすめ初期値：背景34／線守る72／白フチ7／なめらか2。<br>
      フチが太すぎる時は「白フチの太さ」を下げて、線が消える時は「線を守る強さ」を上げてね。
    </div>
  </section>
</div>

<script>
const fileInput = document.getElementById('file');
const srcCanvas = document.getElementById('srcCanvas');
const outCanvas = document.getElementById('outCanvas');
const makeBtn = document.getElementById('makeBtn');
const saveBtn = document.getElementById('saveBtn');
const resetBtn = document.getElementById('resetBtn');
const sliders = ['bgPower','protectPower','strokeSize','smoothSize','noiseSize'].map(id=>document.getElementById(id));
const vals = {bgPower:'vBg', protectPower:'vProtect', strokeSize:'vStroke', smoothSize:'vSmooth', noiseSize:'vNoise'};
let img = null, original = null, outputReady = false;

for (const s of sliders) {
  const span = document.getElementById(vals[s.id]);
  s.addEventListener('input', ()=>{ span.textContent=s.value; if(img) process(); });
}

function fitSize(w,h,max=1400){
  const scale = Math.min(1, max/Math.max(w,h));
  return [Math.round(w*scale), Math.round(h*scale)];
}

fileInput.addEventListener('change', e=>{
  const f = e.target.files[0]; if(!f) return;
  const url = URL.createObjectURL(f);
  img = new Image();
  img.onload = ()=>{
    const [w,h]=fitSize(img.naturalWidth,img.naturalHeight);
    srcCanvas.width=outCanvas.width=w; srcCanvas.height=outCanvas.height=h;
    const ctx=srcCanvas.getContext('2d');
    ctx.clearRect(0,0,w,h);
    ctx.drawImage(img,0,0,w,h);
    original = ctx.getImageData(0,0,w,h);
    makeBtn.disabled=false;
    saveBtn.disabled=true;
    outputReady=false;
    process();
    URL.revokeObjectURL(url);
  };
  img.src=url;
});

makeBtn.addEventListener('click', process);

resetBtn.addEventListener('click', ()=>{
  fileInput.value='';
  img=null; original=null;
  srcCanvas.getContext('2d').clearRect(0,0,srcCanvas.width,srcCanvas.height);
  outCanvas.getContext('2d').clearRect(0,0,outCanvas.width,outCanvas.height);
  makeBtn.disabled=true; saveBtn.disabled=true;
});

saveBtn.addEventListener('click', ()=>{
  const a=document.createElement('a');
  a.download='sukesuke_tshirt.png';
  a.href=outCanvas.toDataURL('image/png');
  a.click();
});

function idx(x,y,w){ return (y*w+x)*4; }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }

function process(){
  if(!original) return;
  const w=original.width,h=original.height;
  const src=original.data;
  const bgPower=+document.getElementById('bgPower').value;
  const protectPower=+document.getElementById('protectPower').value;
  const strokeSize=+document.getElementById('strokeSize').value;
  const smoothSize=+document.getElementById('smoothSize').value;
  const noiseSize=+document.getElementById('noiseSize').value;

  // 背景色：四隅と外周から推定
  let rs=0,gs=0,bs=0,n=0;
  const sample=(x,y)=>{const p=idx(x,y,w); rs+=src[p]; gs+=src[p+1]; bs+=src[p+2]; n++;};
  for(let x=0;x<w;x+=Math.max(1,Math.floor(w/50))){ sample(x,0); sample(x,h-1); }
  for(let y=0;y<h;y+=Math.max(1,Math.floor(h/50))){ sample(0,y); sample(w-1,y); }
  const br=rs/n,bg=gs/n,bb=bs/n;

  const keep = new Uint8ClampedArray(w*h); // 本体
  const lum = new Float32Array(w*h);
  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      const p=idx(x,y,w), q=y*w+x;
      const r=src[p],g=src[p+1],b=src[p+2],a=src[p+3]/255;
      const distBg = Math.sqrt((r-br)*(r-br)+(g-bg)*(g-bg)+(b-bb)*(b-bb));
      const saturation = Math.max(r,g,b)-Math.min(r,g,b);
      const dark = 255 - (0.299*r+0.587*g+0.114*b);
      lum[q]=0.299*r+0.587*g+0.114*b;
      // 背景との差、色味、濃さを総合して「残す」
      let score = distBg*1.4 + saturation*1.15 + dark*0.55;
      // 透明画像の場合は元アルファも尊重
      score *= a;
      keep[q] = score > bgPower ? 255 : 0;
    }
  }

  // エッジを守る：細い線が欠けないように追加
  const edge = new Uint8ClampedArray(w*h);
  for(let y=1;y<h-1;y++){
    for(let x=1;x<w-1;x++){
      const q=y*w+x;
      const gx = -lum[q-w-1]-2*lum[q-1]-lum[q+w-1]+lum[q-w+1]+2*lum[q+1]+lum[q+w+1];
      const gy = -lum[q-w-1]-2*lum[q-w]-lum[q-w+1]+lum[q+w-1]+2*lum[q+w]+lum[q+w+1];
      const mag = Math.sqrt(gx*gx+gy*gy);
      if(mag > (100-protectPower)*2.2) edge[q]=255;
    }
  }
  let mask = union(keep, edge, w, h);

  // 小さい穴・欠け対策
  mask = closeMask(mask,w,h,1);
  if(noiseSize>0) mask = removeTinyNoise(mask,w,h,noiseSize);

  // なめらか用に軽く閉じる
  for(let i=0;i<smoothSize;i++) mask = smoothMask(mask,w,h);

  // 外側だけ白フチ：本体を膨張させた差分
  let stroke = mask.slice();
  for(let i=0;i<strokeSize;i++) stroke = dilate(stroke,w,h);
  const out = new ImageData(w,h);
  const od=out.data;

  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      const q=y*w+x,p=idx(x,y,w);
      if(mask[q]){
        od[p]=src[p]; od[p+1]=src[p+1]; od[p+2]=src[p+2]; od[p+3]=255;
      } else if(stroke[q]){
        od[p]=255; od[p+1]=255; od[p+2]=255; od[p+3]=255;
      } else {
        od[p]=0; od[p+1]=0; od[p+2]=0; od[p+3]=0;
      }
    }
  }

  // 端を軽くアンチエイリアス風に
  if(smoothSize>0) softenAlpha(out,w,h,1);

  const ctx=outCanvas.getContext('2d');
  outCanvas.width=w; outCanvas.height=h;
  ctx.putImageData(out,0,0);
  saveBtn.disabled=false; outputReady=true;
}

function union(a,b,w,h){
  const o=new Uint8ClampedArray(w*h);
  for(let i=0;i<o.length;i++) o[i]=(a[i]||b[i])?255:0;
  return o;
}
function dilate(m,w,h){
  const o=new Uint8ClampedArray(w*h);
  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      let on=0;
      for(let dy=-1;dy<=1;dy++){
        for(let dx=-1;dx<=1;dx++){
          const xx=x+dx,yy=y+dy;
          if(xx>=0&&xx<w&&yy>=0&&yy<h&&m[yy*w+xx]) on=255;
        }
      }
      o[y*w+x]=on;
    }
  }
  return o;
}
function erode(m,w,h){
  const o=new Uint8ClampedArray(w*h);
  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      let on=255;
      for(let dy=-1;dy<=1;dy++){
        for(let dx=-1;dx<=1;dx++){
          const xx=x+dx,yy=y+dy;
          if(xx<0||xx>=w||yy<0||yy>=h||!m[yy*w+xx]) on=0;
        }
      }
      o[y*w+x]=on;
    }
  }
  return o;
}
function closeMask(m,w,h,r){
  let o=m;
  for(let i=0;i<r;i++) o=dilate(o,w,h);
  for(let i=0;i<r;i++) o=erode(o,w,h);
  return o;
}
function smoothMask(m,w,h){
  const o=new Uint8ClampedArray(w*h);
  for(let y=1;y<h-1;y++){
    for(let x=1;x<w-1;x++){
      let c=0;
      for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++) if(m[(y+dy)*w+x+dx]) c++;
      o[y*w+x]= c>=4 ? 255 : 0;
    }
  }
  return o;
}
function removeTinyNoise(m,w,h,level){
  // 周囲の孤立ピクセルを消す軽量処理
  let o=m.slice();
  const rounds=Math.ceil(level/2);
  for(let r=0;r<rounds;r++){
    const n=o.slice();
    for(let y=1;y<h-1;y++){
      for(let x=1;x<w-1;x++){
        const q=y*w+x;
        if(!o[q]) continue;
        let c=0;
        for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++) if(o[(y+dy)*w+x+dx]) c++;
        if(c<=2) n[q]=0;
      }
    }
    o=n;
  }
  return o;
}
function softenAlpha(img,w,h,passes){
  const d=img.data;
  for(let pass=0;pass<passes;pass++){
    const a=new Uint8ClampedArray(w*h);
    for(let i=0;i<w*h;i++) a[i]=d[i*4+3];
    for(let y=1;y<h-1;y++){
      for(let x=1;x<w-1;x++){
        const q=y*w+x,p=q*4;
        if(a[q]===0) continue;
        let min=255,max=0;
        for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++){
          const v=a[(y+dy)*w+x+dx]; min=Math.min(min,v); max=Math.max(max,v);
        }
        if(min===0 && max===255) d[p+3]=230;
      }
    }
  }
}
</script>
</body>
</html>
